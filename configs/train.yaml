# Training configuration — train an order embedding model from scratch
device:
  device: auto

model:
  conv_type: SAGE
  n_layers: 8
  hidden_dim: 64
  skip: learnable
  dropout: 0.0
  margin: 0.1
  model_path: ckpt/model.pt

training:
  enabled: true
  n_batches: 100000
  batch_size: 64
  lr: 0.0001
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  eval_interval: 1000
  val_size: 4096
  min_graph_size: 5
  max_graph_size: 29
  data_source: synthetic
  checkpoint_dir: ckpt
  node_anchored: true
  clip_grad: 1.0

seed: 42
