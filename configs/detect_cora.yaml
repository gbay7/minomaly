# Run anomaly detection on inj_cora using the trained GLASS hybrid model
device:
  device: auto

dataset:
  name: inj_cora
  task: struct-anomaly

model:
  method_type: hybrid
  conv_type: SAGE
  skip: learnable
  n_layers: 8
  hidden_dim: 64
  margin: 0.1
  dropout: 0.0
  input_dim: 2
  model_path: ckpt/model.pt

sampling:
  n_neighborhoods: 10000
  min_neighborhood_size: 1
  max_neighborhood_size: 30
  radial_radius: 2
  node_anchored: true
  add_self_loop: true

search:
  min_steps: 7
  max_steps: 7
  max_freq: 35.0
  min_strength: 0.0
  max_unchanged: 5
  n_beams: 1
  alpha: 0.33
  scoring_function: freq
  search_strategy: strength
  add_verified_neighs: true
  min_neigh_repeat: 2
  nodes_batch_size: 100

outlier:
  methods:
    - model_based
    - isolation_forest
  combine: union
  isolation_contamination: auto

training:
  enabled: false

visualization:
  enabled: true
  output_dir: plots
  out_batch_size: 10

seed: 42
batch_size: 1000
