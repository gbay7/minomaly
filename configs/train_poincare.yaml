# Train a Poincaré (hyperbolic) embedding model
# Uses SkipLastGNN (Euclidean) as backbone, projects output into the Poincaré ball
device:
  device: auto

model:
  method_type: poincare
  conv_type: SAGE
  skip: learnable
  n_layers: 8
  hidden_dim: 64
  margin: 0.1
  model_path: ckpt/poincare_model.pt
  curvature: 1.0
  learnable_curvature: false

training:
  enabled: true
  n_batches: 50000
  batch_size: 64
  lr: 0.0001
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  eval_interval: 1000
  val_size: 4096
  min_graph_size: 5
  max_graph_size: 29
  checkpoint_dir: ckpt
  node_anchored: true
  clip_grad: 1.0

seed: 42
