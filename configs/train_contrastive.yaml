# Train a Contrastive + GATv2 embedding model
device:
  device: auto

model:
  method_type: contrastive
  n_layers: 4
  n_heads: 4
  hidden_dim: 64
  margin: 0.5
  temperature: 0.07
  dropout: 0.0
  model_path: ckpt/contrastive_model.pt

training:
  enabled: true
  n_batches: 50000
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  eval_interval: 1000
  val_size: 4096
  min_graph_size: 5
  max_graph_size: 29
  checkpoint_dir: ckpt
  node_anchored: true
  clip_grad: 1.0

seed: 42
batch_size: 1000
