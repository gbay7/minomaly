device:
  device: auto

dataset:
  name: elliptic
  task: struct-anomaly

model:
  conv_type: SAGE
  n_layers: 8
  hidden_dim: 64
  skip: learnable
  dropout: 0.0
  margin: 0.1
  model_path: ckpt/model.pt
  input_dim: 2

sampling:
  n_neighborhoods: 50000
  min_neighborhood_size: 1
  max_neighborhood_size: 30
  radial_radius: 2
  node_anchored: true
  add_self_loop: true

search:
  min_steps: 1
  max_steps: 9
  max_freq: 150.0
  min_strength: 0.0
  max_unchanged: 3
  n_beams: 1
  max_cands: 20
  alpha: 0.33
  scoring_function: freq
  verif_scoring_function: freq_verif
  search_strategy: strength
  add_verified_neighs: false
  min_neigh_repeat: 2
  nodes_batch_size: 100

outlier:
  methods:
    - model_based
    - isolation_forest
  combine: union
  isolation_contamination: auto

training:
  enabled: false

visualization:
  enabled: true
  output_dir: plots
  out_batch_size: 10

seed: 42
batch_size: 10000
