# FraudAmazon (DGL) — co-purchase projection (U-P-U relation)
# Real fraud labels, no synthetic injection
device:
  device: auto

dataset:
  name: fraud_amazon
  task: all-anomaly
  relation: upu

model:
  method_type: order
  conv_type: SAGE
  skip: learnable
  n_layers: 8
  hidden_dim: 64
  margin: 0.1
  dropout: 0.0
  input_dim: 2
  model_path: ckpt_order_glass/best_model.pt
  degree_normalize: false

sampling:
  n_neighborhoods: 10000
  min_neighborhood_size: 1
  max_neighborhood_size: 30
  radial_radius: 2
  node_anchored: true
  add_self_loop: true

search:
  min_steps: 1
  max_steps: 5
  max_freq: 80.0
  outlier_max_freq: 500.0
  min_strength: 0.0
  max_unchanged: 5
  n_beams: 1
  max_cands: 10
  alpha: 0.33
  scoring_function: freq
  search_strategy: sampled
  add_verified_neighs: true
  min_neigh_repeat: 2
  nodes_batch_size: 16
  sample_size: 2000

outlier:
  methods:
    - model_based
    - isolation_forest
  combine: union
  isolation_contamination: auto

training:
  enabled: false

visualization:
  enabled: false

seed: 42
batch_size: 1000
