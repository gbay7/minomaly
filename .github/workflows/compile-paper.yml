name: Compile Paper

on:
  push:
    branches: [paper]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Zip paper source
        run: |
          zip -r minomaly-paper-source.zip \
            main.tex refs.bib newrefs.bib \
            figs/ tables/ \
            sn-jnl.cls sn-basic.bst sn-apacite.bst sn-aps.bst \
            sn-chicago.bst sn-mathphys-ay.bst sn-mathphys-num.bst \
            sn-nature.bst sn-vancouver.bst

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: paper-${{ github.sha }}
          name: Paper Build ${{ github.run_number }}
          body: Compiled paper and source from commit ${{ github.sha }}
          files: |
            main.pdf
            minomaly-paper-source.zip
